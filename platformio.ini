[platformio]
default_envs = esp32-2432s024r

[env:m5stickc-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
; Exclude the CYD compat shim — it's only for the esp32-2432s024r env.
build_src_filter = +<*> +<buddies/> -<compat/>
lib_deps =
    m5stack/M5StickCPlus
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; ESP32-2432S024R — Sunton "Cheap Yellow Display", 2.4" 240x320 ST7789 + XPT2046.
; The m5stack/M5StickCPlus lib is deliberately ABSENT here: src/compat is on the
; include path and ships an M5StickCPlus.h shim that every source file resolves
; to, mapping M5.* onto this board's TFT_eSPI display, resistive touch, and PWM
; backlight. App/BLE/pet/stats code is unchanged.
[env:esp32-2432s024r]
; Pinned to the 6.x line (Arduino-ESP32 core 2.0.x). The firmware uses the
; Bluedroid BLE API and Arduino min()/max() macros, both changed/removed in
; core 3.x.
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = boards/partitions_4mb.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
; Stage characters/bufo into data/ before the LittleFS image is built so
; `pio run -t uploadfs` always bundles a character.
extra_scripts = pre:tools/prep_fs.py
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Isrc/compat
    -include src/compat/tft_setup_s024.h
build_src_filter = +<*> +<buddies/> +<compat/>
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
